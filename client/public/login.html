<!doctype html>
<html lang="fi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kirjaudu sisään – Kartalla</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Nunito', sans-serif;
        background: #f5f5f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: #fff;
        border-radius: 8px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
        padding: 48px 40px;
        width: 100%;
        max-width: 400px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      .logo {
        width: 48px;
        height: 48px;
      }

      .heading {
        font-size: 1.5rem;
        font-weight: 600;
        color: #515b68;
        text-align: center;
      }

      .buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
      }

      .btn {
        display: flex;
        align-items: center;
        width: 100%;
        height: 41px;
        padding: 0 12px;
        border: 1px solid #8c8c8c;
        background: #ffffff;
        color: #5e5e5e;
        font-family:
          'Segoe UI',
          'Segoe UI Variable Text',
          -apple-system,
          BlinkMacSystemFont,
          'Helvetica Neue',
          Helvetica,
          Arial,
          sans-serif;
        font-size: 15px;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: background-color 0.15s;
        gap: 12px;
      }

      .btn:hover {
        background: #f5f5f5;
      }

      .btn:focus-visible {
        outline: 2px solid #000;
        outline-offset: 2px;
      }

      .btn-icon {
        flex-shrink: 0;
        display: flex;
        align-items: center;
      }

      .btn-label {
        flex: 1;
        text-align: center;
      }

      .btn-ubi {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 41px;
        padding: 0 12px;
        border-radius: 4px;
        border: 1px solid #008577;
        background: transparent;
        color: #008577;
        font-family: 'Nunito', sans-serif;
        font-size: 0.9375rem;
        font-weight: 600;
        text-decoration: none;
        cursor: pointer;
        transition: background-color 0.15s;
      }

      .btn-ubi:hover {
        background: rgba(0, 133, 119, 0.04);
      }

      .btn-ubi:focus-visible {
        outline: 2px solid #000;
        outline-offset: 2px;
      }

      .divider {
        width: 100%;
        display: flex;
        align-items: center;
        gap: 12px;
        color: #9e9e9e;
        font-size: 0.85rem;
      }

      .divider::before,
      .divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: #e0e0e0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img class="logo" src="/favicon.svg" alt="Kartalla" />
      <h1 class="heading">Kartalla</h1>
      <div class="buttons">
        <a href="/login/v1" class="btn">
          <span class="btn-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="21"
              height="21"
              viewBox="0 0 21 21"
              aria-hidden="true"
            >
              <rect x="1" y="1" width="9" height="9" fill="#f25022" />
              <rect x="1" y="11" width="9" height="9" fill="#00a4ef" />
              <rect x="11" y="1" width="9" height="9" fill="#7fba00" />
              <rect x="11" y="11" width="9" height="9" fill="#ffb900" />
            </svg>
          </span>
          <span class="btn-label">Kirjaudu sisään Microsoft-tilillä</span>
        </a>
        <div class="divider">tai</div>
        <a href="/login/v2" class="btn-ubi"
          >Kirjaudu sisään (uusi kirjautuminen)</a
        >
      </div>
      <p id="error-msg" style="display:none;color:#d32f2f;font-size:0.875rem;text-align:center;">
        Kirjautuminen epäonnistui. Yritä uudelleen.
      </p>
    </div>
    <script>
      const params = new URLSearchParams(window.location.search);
      const redirect = params.get('redirect');
      if (redirect) {
        document.querySelectorAll('a[href^="/login/"]').forEach((a) => {
          a.href += '?redirect=' + encodeURIComponent(redirect);
        });
      }
      if (params.get('error') === 'auth_failed') {
        document.getElementById('error-msg').style.display = 'block';
      }
    </script>
  </body>
</html>
